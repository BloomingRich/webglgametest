<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>WebGPU Pointer Flow Tracker</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05060a;
        font-family: Inter, system-ui, -apple-system, sans-serif;
      }

      #app {
        position: fixed;
        inset: 0;
      }

      #flowCanvas {
        width: 100%;
        height: 100%;
        touch-action: none;
        display: block;
      }

      #overlay {
        position: fixed;
        top: env(safe-area-inset-top, 0);
        left: 0;
        right: 0;
        padding: 1rem;
        display: flex;
        justify-content: space-between;
        pointer-events: none;
        color: rgba(255, 255, 255, 0.88);
        text-shadow: 0 2px 14px rgba(0, 0, 0, 0.75);
      }

      #overlay h1 {
        margin: 0;
        font-size: clamp(0.95rem, 2.9vw, 1.15rem);
        font-weight: 650;
      }

      #overlay p {
        margin: 0.25rem 0 0;
        font-size: clamp(0.7rem, 2.2vw, 0.85rem);
        opacity: 0.8;
      }

      #fallback {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        color: #f0f4ff;
        background: radial-gradient(circle at 30% 20%, #1b1f3a 0%, #090b14 65%);
        text-align: center;
        padding: 2rem;
      }

      #fallback.show {
        display: grid;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="flowCanvas"></canvas>
      <div id="overlay">
        <div>
          <h1>WebGPU Pointer Flow Tracker</h1>
          <p>Drag or touch to inject velocity + dye. Multi-touch supported.</p>
        </div>
      </div>
      <div id="fallback">
        <div>
          <h1>WebGPU Not Available</h1>
          <p>This demo requires a browser with WebGPU enabled.</p>
        </div>
      </div>
    </div>
    <script type="module" src="main.js"></script>
  </body>
</html>
